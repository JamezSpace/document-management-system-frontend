<!-- breadcrumb at the top -->
<nav hlmBreadcrumb>
  <ol hlmBreadcrumbList class="text-(--brand-accent-shade-1)">
    @for (directory of directories(); track $index) {
      <li hlmBreadcrumbItem>
        <button hlmBreadcrumbLink class="capitalize">{{ directory }}</button>
      </li>

      <!-- that is, if there still exists a next directory -->
      @if ($index + 1 !== directories().length) {
        <li hlmBreadcrumbSeparator></li>
      }
    }
  </ol>
</nav>

<!-- avoiding quick nesting by placing this here while serving my intention of spacing beneath the breadbrumb -->
<div class="mt-5"></div>

<section class="flex-center justify-between">
  <article>
    <nexus-spartan-h3>staff personnel registry</nexus-spartan-h3>
    <nexus-spartan-p> Manage university unit administration and faculty records. </nexus-spartan-p>
  </article>
  <button
    type="button"
    class="nexus-button flex-center"
    hlmBtn
    [brnAlertDialogTriggerFor]="registerNewStaffAlertDialog"
  >
    <ng-icon name="lucidePlus" />
    <span> register new staff</span>
  </button>
</section>

<hlm-separator class="my-4" />

<!-- staff operations e.g. sort, filter, search -->
<div class="flex-center gap-2.5" aria-label="staff operations e.g. sort, filter, search etc.">
  <!-- search -->
  <div hlmInputGroup>
    <input
      type="text"
      name=""
      maxlength="50"
      placeholder="Search by title, reference number or subject..."
      autocorrect="off"
      hlmInputGroupInput
    />

    <div hlmInputGroupAddon align="inline-end">
      <ng-icon name="lucideSearch" />
    </div>
  </div>

  <!-- sort -->
  <hlm-menubar>
    <button type="button" [hlmMenubarTrigger]="sortOptions">
      <ng-icon name="lucideArrowDownUp" />
      <span class="capitalize ml-2.5">sort</span>
    </button>
  </hlm-menubar>
  <ng-template #sortOptions>
    <hlm-dropdown-menu sideOffset="2.5">
      <button hlmDropdownMenuRadio checked>
        <hlm-dropdown-menu-radio-indicator />
        Name
      </button>
      <button hlmDropdownMenuRadio>
        <hlm-dropdown-menu-radio-indicator />
        Date
      </button>
      <button hlmDropdownMenuRadio>
        <hlm-dropdown-menu-radio-indicator />
        Type
      </button>
      <hlm-dropdown-menu-separator />
      <button hlmDropdownMenuRadio checked>
        <hlm-dropdown-menu-radio-indicator />
        Ascending
      </button>
      <button hlmDropdownMenuRadio>
        <hlm-dropdown-menu-radio-indicator />
        Descending
      </button>
    </hlm-dropdown-menu>
  </ng-template>
</div>

<hlm-separator class="my-4" />

<!-- alert dialog to select new document type -->
<hlm-alert-dialog #registerNewStaffAlertDialog>
    <hlm-alert-dialog-content *brnAlertDialogContent="let ctx" class="min-w-[60vw]">
      <hlm-alert-dialog-header>
        <nexus-spartan-h4>Register new staff</nexus-spartan-h4>
        <nexus-spartan-muted
          >Complete the form to onboard a new personnel member.</nexus-spartan-muted
        >
      </hlm-alert-dialog-header>

      <hlm-separator class="" />

      <mat-stepper [linear]="false" [orientation]="isMobile() ? 'vertical' : 'horizontal'" #stepper>
        <!-- personal information -->
        <mat-step [stepControl]="staffPersonalInformationFormGroup" label="Personal Information">
          <form [formGroup]="staffPersonalInformationFormGroup">
            <div class="row flex-center gap-3.5">
              <div class="field">
                <label hlmLabel for="firstName">First Name</label>
                <input
                  hlmInput
                  type="text"
                  id="firstName"
                  placeholder="e.g. John"
                  formControlName="firstName"
                />
              </div>
              <div class="field">
                <label hlmLabel for="lastName">Last Name</label>
                <input
                  hlmInput
                  type="text"
                  id="lastName"
                  placeholder="e.g. Mike"
                  formControlName="lastName"
                />
              </div>
              <div class="field">
                <label hlmLabel for="middleName">Middle Name</label>
                <input
                  hlmInput
                  type="text"
                  id="middleName"
                  placeholder="e.g. Mike"
                  formControlName="middleName"
                />
              </div>
            </div>
            <div class="row flex-center gap-3.5">
              <div class="field">
                <label hlmLabel for="email">Email Address</label>
                <input
                  hlmInput
                  type="email"
                  id="email"
                  placeholder="johndoe@gmail.com"
                  formControlName="email"
                />
              </div>
              <div class="field">
                <label hlmLabel for="phoneNum">Phone Number</label>
                <input
                  hlmInput
                  type="text"
                  id="phoneNum"
                  placeholder="+234-8123456789"
                  formControlName="phoneNum"
                />
              </div>
            </div>
          </form>
        </mat-step>

        <!-- professional details -->
        <mat-step [stepControl]="professionalDetailsFormGroup" label="Professional Details">
          <form [formGroup]="professionalDetailsFormGroup">
            <div class="row">
              <div class="field in-dashboard">
                <label hlmLabel for="internalUnit">Internal Unit</label>

                <brn-select
                  class="block w-full"
                  placeholder="Select a department"
                  id="internalUnit"
                >
                  <hlm-select-trigger class="w-full">
                    <hlm-select-value />
                  </hlm-select-trigger>
                  <hlm-select-content>
                    <hlm-option value="Refresh">Refresh</hlm-option>
                    <hlm-option value="Settings">Settings</hlm-option>
                    <hlm-option value="Help">Help</hlm-option>
                    <hlm-option value="Signout">Sign out</hlm-option>
                  </hlm-select-content>
                </brn-select>
              </div>
            </div>
            <div class="row">
              <div class="field in-dashboard">
                <label hlmLabel for="designation">Designation</label>
                <input
                  hlmInput
                  type="text"
                  id="designation"
                  placeholder="e.g. senior lecturer"
                  formControlName="designation"
                />
              </div>
            </div>
            <div class="row">
              <div class="field in-dashboard">
                <label hlmLabel for="staffId">Staff ID</label>
                <div hlmInputGroup>
                  <div hlmInputGroupAddon align="inline-start">
                    <ng-icon name="lucideHash" />
                  </div>

                  <input
                    type="text"
                    id="staffId"
                    maxlength="50"
                    placeholder="---"
                    autocorrect="off"
                    hlmInputGroupInput
                  />
                </div>
              </div>
            </div>
          </form>
        </mat-step>

        <!-- registry configuration -->
        <!-- <mat-step [stepControl]="" label="Registry Configuration">
        <form [formGroup]="">
            <hlm-radio-group>
                <label for="">
                    <hlm-radio value="card">
					<ng-icon hlm name="lucideCreditCard" class="mb-3" />
				</hlm-radio>
                    <article>
                        <nexus-spartan-p>Active Personnel</nexus-spartan-p>
                        <nexus-spartan-muted>Regular working hour apply</nexus-spartan-muted>
                    </article>
                </label>
                <label for="">
                    <hlm-radio value="card">
					<ng-icon hlm name="lucideCreditCard" class="mb-3" />
				</hlm-radio>
                    <article>
                        <nexus-spartan-p>On Leave</nexus-spartan-p>
                        <nexus-spartan-muted>Temporary absence</nexus-spartan-muted>
                    </article>
                </label>
            </hlm-radio-group>
        </form>
       </mat-step> -->
      </mat-stepper>

      <div class="flex-center gap-5 mt-3.5">
        <div class="flex-center gap-2.5" [class.w-full]="!isFinalStepInCompletingNewStaffRecord()">
          <button
            type="button"
            class="nexus-button outlined gap-2.5"
            [class]="{
              'flex-center': currentStepInCompletingNewStaffRecord() > 1,
              hidden: currentStepInCompletingNewStaffRecord() === 1,
            }"
            (click)="revertToPreviousStepInCompletingNewStaffRecord()"
          >
            <svg xmlns="http://www.w3.org/2000/svg" width="1em" height="1em" viewBox="0 0 24 24">
              <rect width="24" height="24" fill="none" />
              <path fill="currentColor" d="m14 18l-6-6l6-6l1.4 1.4l-4.6 4.6l4.6 4.6z" />
            </svg>
            Previous Step
          </button>

          <button
            type="button"
            class="nexus-button gap-2.5"
            [class]="{
              'flex-center':
                currentStepInCompletingNewStaffRecord() < numberOfStepsToCompleteNewStaffRecord,
              hidden:
                currentStepInCompletingNewStaffRecord() === numberOfStepsToCompleteNewStaffRecord,
              secondary: isFinalStepInCompletingNewStaffRecord(),
              'w-full': !isFinalStepInCompletingNewStaffRecord(),
            }"
            (click)="proceedToNextStepToCompleteNewStaffRecord()"
          >
            Next Step
            <svg xmlns="http://www.w3.org/2000/svg" width="1em" height="1em" viewBox="0 0 24 24">
              <rect width="24" height="24" fill="none" />
              <path fill="currentColor" d="M12.6 12L8 7.4L9.4 6l6 6l-6 6L8 16.6z" />
            </svg>
          </button>
        </div>

        <button
          type="button"
          class="nexus-button"
          [class.disabled]="!isFinalStepInCompletingNewStaffRecord()"
          [class.secondary]="!isFinalStepInCompletingNewStaffRecord()"
          [class.w-full]="isFinalStepInCompletingNewStaffRecord()"
        >
          add staff
        </button>
      </div>
    </hlm-alert-dialog-content>
</hlm-alert-dialog>
