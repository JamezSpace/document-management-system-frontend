<div class="flex-center pl-3 5 py-1 rounded-xs">
  <span class="flex-center justify-center">
    @if (data.type === 'success') {
        <ng-icon name="hugeTick04" class="text-inherit text-base"/>
    } @else {
        <ng-icon name="hugeInformationSquare" class="text-inherit text-base"/>
    }
  </span>
  <span matSnackBarLabel>{{ data.message }}</span>
</div>
